<h2 class="font-display-lg text-display-lg text-text-main mb-xs">Cat&aacute;logo de Items</h2>
<p class="text-text-muted font-body-md">Explora y solicita el equipo necesario para tus proyectos acad&eacute;micos.</p>

<!-- Item Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-gutter" id="itemsGrid">
<div class="col-span-full text-center text-text-muted py-20">Cargando...</div>
</div>

<script>
        const h = (s) => { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; };
        const API = '/api/items';

        async function verificarSesion() {
          const res = await fetch('/api/auth/me');
          const data = await res.json();
          if (!data.success) window.location.href = '/login.html';
        }

        async function cargarCatalogo() {
          const grid = document.getElementById('itemsGrid');
          if (!grid) return;
          grid.innerHTML = '<div class="col-span-full text-center text-text-muted py-20">Cargando...</div>';
          const params = new URLSearchParams();
          const q = document.getElementById('searchInput')?.value.trim();
          if (q) params.set('busqueda', q);
          try {
            const res = await fetch(`${API}?${params}`);
            const data = await res.json();
            if (!data.success) throw new Error(data.message);
            const items = data.data;
            if (items.length === 0) {
              grid.innerHTML = '<div class="col-span-full text-center text-text-muted py-20">No se encontraron \u00edtems</div>';
              return;
            }
            grid.innerHTML = items.map(i => {
              const disponible = i.cantidad > 0 && i.estado === 'disponible';
              const fotoUrl = i.foto_url ? i.foto_url.replace(/[<>"'()]/g, '') : '';
              const bgStyle = fotoUrl ? `background-image: url('${fotoUrl}')` : 'background-color: #f3f4f6';
              const estadoLabel = h(i.estado?.replace('_', ' ') || 'No disponible');
              const nombreEsc = h(i.nombre);
              const categoriaEsc = h(i.categoria);
              const codigoEsc = h(i.codigo_escaneable || '\u2014');
              return `<div class="bg-white border border-border-default rounded-lg overflow-hidden card-hover flex flex-col shadow-sm">
                <div class="h-48 bg-cover bg-center bg-surface-container-low" style="${bgStyle};"></div>
                <div class="p-lg flex flex-col flex-grow">
                  <div class="flex justify-between items-start mb-sm">
                    <span class="px-sm py-1 bg-primary/10 text-primary font-label-md text-label-md rounded-full">${categoriaEsc}</span>
                    <div class="flex items-center gap-xs px-sm py-1 ${disponible ? 'bg-success/10 text-success' : 'bg-tertiary-fixed/30 text-[#F59E0B]'} rounded-full">
                      <span class="w-2 h-2 ${disponible ? 'bg-success' : 'bg-[#F59E0B]'} rounded-full"></span>
                      <span class="font-label-md text-label-md uppercase">${disponible ? 'Disponible' : estadoLabel}</span>
                    </div>
                  </div>
                  <h3 class="font-headline-md text-title-md text-text-main mb-xs">${nombreEsc}</h3>
                  <p class="text-text-muted font-body-sm mb-lg">ID: ${codigoEsc}</p>
                  <button class="mt-auto w-full py-md ${disponible ? 'bg-primary-container text-white hover:brightness-110' : 'bg-border-default text-text-muted cursor-not-allowed'} font-title-md rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-sm" ${disponible ? `onclick="solicitarPrestamo(${i.id})"` : 'disabled'}>
                    <span class="material-symbols-outlined text-lg">${disponible ? 'add_circle' : 'schedule'}</span>
                    ${disponible ? 'Solicitar Pr\u00e9stamo' : 'No Disponible'}
                  </button>
                </div>
              </div>`;
            }).join('');
          } catch (err) {
            grid.innerHTML = `<div class="col-span-full text-center text-danger py-20">Error: ${h(err.message)}</div>`;
          }
        }

        async function solicitarPrestamo(id) {
          try {
            const res = await fetch('/api/movimientos/retiro', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id_item: id })
            });
            const data = await res.json();
            if (data.success) {
              alert('Pr\u00e9stamo registrado exitosamente');
              await cargarCatalogo();
            } else {
              alert(data.message);
            }
          } catch { alert('Error de conexi\u00f3n'); }
        }

        async function cerrarSesion() {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = '/login.html';
        }

        document.addEventListener('DOMContentLoaded', async () => {
          await verificarSesion();
          await cargarCatalogo();
          document.getElementById('searchInput')?.addEventListener('input', debounce(cargarCatalogo, 300));
          const logoutBtns = document.querySelectorAll('[onclick="cerrarSesion()"]');
          logoutBtns.forEach(b => b.addEventListener?.('click', cerrarSesion));
        });

        function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

        document.querySelectorAll('button:not([disabled])').forEach(btn => {
          btn.addEventListener('click', function() { this.classList.add('scale-95'); setTimeout(() => this.classList.remove('scale-95'), 100); });
        });
    </script>
