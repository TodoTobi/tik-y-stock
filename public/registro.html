<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse — TIC & Stock</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Crear Cuenta</h1>
      <p class="auth-subtitle">TIC & Stock — Inventario del Taller</p>
      <form id="registerForm">
        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" required autocomplete="name" autofocus>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Contraseña (mín. 6 caracteres)</label>
          <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
        </div>
        <div id="errorMsg" class="error-msg"></div>
        <button type="submit" id="submitBtn">Crear cuenta</button>
      </form>
      <p class="auth-link">¿Ya tenés cuenta? <a href="login.html">Iniciar sesión</a></p>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
