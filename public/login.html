<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — TIC & Stock</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>TIC & Stock</h1>
      <p class="auth-subtitle">Sistema de Gestión de Inventario</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <div id="errorMsg" class="error-msg"></div>
        <button type="submit" id="submitBtn">Ingresar</button>
      </form>
      <p class="auth-link">¿No tenés cuenta? <a href="registro.html">Registrarse</a></p>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
