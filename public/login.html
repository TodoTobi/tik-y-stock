<input class="peer h-5 w-5 rounded border-outline-variant text-primary-container focus:ring-primary-container focus:ring-offset-0 transition-all" type="checkbox"/>
</div>
<span class="font-body-sm text-body-sm text-text-muted group-hover:text-text-main transition-colors select-none">Recordar mis datos</span>
</label>
</div>
<!-- Error Message -->
<div class="hidden bg-danger/10 text-danger px-lg py-sm rounded-lg text-body-md" id="errorMsg"></div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary-container text-white rounded-lg font-semibold text-body-md hover:bg-primary transition-all active:scale-[0.98] shadow-sm flex items-center justify-center gap-2 mt-sm" type="submit">
                    Iniciar Sesión
                </button>
</form>
<!-- Forgotten Password Link -->
<div class="flex justify-center pt-md">
<a class="font-label-md text-label-md text-primary-container hover:text-primary hover:underline transition-all" href="#">
                    ¿Olvidaste tu contraseña?
                </a>
</div>
</div>
</main>
<!-- Global Footer -->
<footer class="absolute bottom-6 w-full text-center px-lg">
<p class="font-body-sm text-[11px] text-[#94A3B8] tracking-wide uppercase opacity-80">
            © 2026 TIC y Stock — Todos los derechos reservados
        </p>
</footer>
<!-- Micro-interactions Script -->
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Real API login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Validando...';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value.trim(), password: document.getElementById('password').value })
                });
                const data = await res.json();
                if (data.success) {
                    btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Accediendo';
                    setTimeout(() => {
                        window.location.href = data.data.rol === 'superusuario' ? '/admin/movimientos.html' : '/usuario/catalogo.html';
                    }, 800);
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = 'Iniciar Sesión';
                }
            } catch {
                errorMsg.textContent = 'Error de conexión con el servidor';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = 'Iniciar Sesión';
            }
        });
    </script>
</body></html>
